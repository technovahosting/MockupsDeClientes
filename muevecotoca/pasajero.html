<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MueveCotoca — App Pasajero (Mockup)</title>

<!--
  ============================================================
  MueveCotoca — Mockup interactivo (versión LEGIBLE)
  ============================================================
  Asociación de Mototaxis y Trufis · Cotoca, Santa Cruz (Bolivia)

  Este archivo es HTML + CSS + JavaScript PLANO. No usa ningún
  empaquetado, base64 ni runtime externo. Se puede leer y editar
  de arriba a abajo en cualquier editor.

  Dependencias (CDN estándar, opcionales para el diseño):
    - Google Fonts: Space Grotesk + IBM Plex Sans/Mono
    - Lucide icons (https://lucide.dev)

  Estructura del archivo:
    1) <style>  → todos los estilos y los colores del tema (claro/oscuro)
    2) <body>   → el marco del teléfono y el contenedor #app
    3) <script> → el "estado" + las funciones que dibujan cada pantalla

  Cómo funciona la navegación:
    - Hay un objeto `state` con la pantalla actual, el rol, el tema, etc.
    - `setState({...})` cambia el estado y vuelve a dibujar con `render()`.
    - Cada pantalla es una función que devuelve un string de HTML.
  ============================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<style>
  /* ---------- 1. TEMA: colores y tokens ---------- */
  :root {
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'IBM Plex Sans', sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;

    --primary: #76BC4A;          /* verde de la marca */
    --primary-hover: #5FA236;
    --primary-soft: rgba(118,188,74,0.12);
    --primary-soft-strong: rgba(118,188,74,0.20);
    --danger: #B83B2D;  --danger-soft: rgba(184,59,45,0.12);
    --warning: #C68A1F; --warning-soft: rgba(198,138,31,0.14);
    --info: #4A8FB8;    --info-soft: rgba(74,143,184,0.14);

    /* superficies (tema claro) */
    --bg: #F8F7FA; --bg-elev: #FFFFFF; --bg-soft: #F1F0F2;
    --fg: #2F2B3D; --fg-muted: #6F6B7D; --fg-faint: #A5A3AE;
    --border: rgba(47,43,61,0.08); --border-2: rgba(47,43,61,0.16);
    --shadow-card: 0 2px 6px rgba(47,43,61,0.06);
    --map-bg: #E6E9E3; --map-road: #FFFFFF;
    --stage: #E4E4E7; --stage-dot: rgba(47,43,61,0.10);
  }
  /* superficies (tema oscuro) */
  [data-theme="dark"] {
    --bg: #25293C; --bg-elev: #2F3349; --bg-soft: #3B3F5C;
    --fg: #E7E3FC; --fg-muted: #B6BEE3; --fg-faint: #7E83A5;
    --border: rgba(231,227,252,0.09); --border-2: rgba(231,227,252,0.18);
    --shadow-card: 0 2px 6px rgba(15,17,27,0.30);
    --map-bg: #1B2030; --map-road: #2C3346;
    --stage: #15171F; --stage-dot: rgba(255,255,255,0.05);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: var(--font-body);
    background-color: var(--stage);
    background-image: radial-gradient(var(--stage-dot) 1.2px, transparent 1.2px);
    background-size: 22px 22px;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; gap: 18px; padding: 28px 20px 40px;
  }
  button { font-family: inherit; cursor: pointer; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  .i { width: 1em; height: 1em; display: inline-flex; }
  svg.lucide { display: block; }

  /* ---------- Barra de control superior (cambiar rol / tema) ---------- */
  .toolbar {
    width: 394px; max-width: 100%; display: flex; align-items: center; gap: 12px;
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: 14px; padding: 10px 12px; box-shadow: var(--shadow-card); color: var(--fg);
  }
  .toolbar .logo { width: 34px; height: 34px; border-radius: 9px; background: var(--primary);
    display: flex; align-items: center; justify-content: center; color: #fff; flex: none; }
  .toolbar .name { font-family: var(--font-display); font-size: 14px; font-weight: 700; }
  .toolbar .tag { font-family: var(--font-mono); font-size: 9px; letter-spacing: .1em;
    text-transform: uppercase; color: var(--fg-faint); }
  .seg { display: flex; background: var(--bg-soft); border-radius: 999px; padding: 3px; gap: 2px; }
  .seg button { border: none; font-size: 11px; font-weight: 600; padding: 6px 9px;
    border-radius: 999px; background: transparent; color: var(--fg-muted); }
  .seg button.on { background: var(--bg-elev); color: var(--fg); }
  .seg.icons button { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; padding: 0; }
  .seg.icons button.on { background: var(--primary-soft); color: var(--primary); }

  /* ---------- Marco del teléfono (Android) ---------- */
  .phone {
    width: 394px; max-width: 100%; height: 762px; background: #0c0d10;
    border: 11px solid #0c0d10; border-radius: 46px; flex: none; position: relative;
    box-shadow: 0 30px 60px -18px rgba(20,22,34,.45), 0 10px 22px rgba(20,22,34,.18);
  }
  .screen {
    position: absolute; inset: 0; background: var(--bg); border-radius: 35px;
    overflow: hidden; display: flex; flex-direction: column; color: var(--fg);
  }
  .statusbar { height: 34px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    color: var(--fg); position: relative; z-index: 8; flex: none; }
  .notch { position: absolute; left: 50%; top: 10px; transform: translateX(-50%);
    width: 9px; height: 9px; border-radius: 50%; background: #000; opacity: .85; }
  .body { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
  .navhandle { flex: none; height: 20px; display: flex; align-items: center; justify-content: center; background: var(--bg-elev); }
  .navhandle span { width: 118px; height: 5px; border-radius: 3px; background: var(--fg); opacity: .26; }

  /* ---------- Barra de pestañas inferior ---------- */
  .tabbar { flex: none; display: grid; grid-template-columns: repeat(4,1fr); gap: 2px;
    padding: 8px 8px 6px; background: var(--bg-elev); border-top: 1px solid var(--border); z-index: 6; }
  .tabbar button { display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: transparent; border: none; font-size: 10px; font-weight: 600; padding: 4px 0; color: var(--fg-faint); }
  .tabbar button.on { color: var(--primary); }

  /* ---------- Utilidades de layout ---------- */
  .scroll { position: absolute; inset: 0; overflow-y: auto; background: var(--bg); padding: 16px 18px 24px; }
  .row { display: flex; align-items: center; gap: 11px; }
  .col { display: flex; flex-direction: column; }
  .grow { flex: 1; min-width: 0; }
  .h1 { font-family: var(--font-display); font-size: 21px; font-weight: 700; letter-spacing: -.02em; margin: 6px 0 4px; }
  .muted { color: var(--fg-muted); }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-muted); font-weight: 600; }
  .mono { font-family: var(--font-mono); }
  .card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 16px; padding: 16px; box-shadow: var(--shadow-card); }
  .btn { width: 100%; padding: 15px; border: none; border-radius: 14px; background: var(--primary); color: #fff;
    font-size: 15px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn:hover { background: var(--primary-hover); }
  .btn-2 { background: var(--bg-elev); border: 1px solid var(--border); color: var(--fg); }
  .avatar { border-radius: 50%; background: linear-gradient(135deg, var(--primary), #36631B); color: #fff;
    display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; flex: none; }

  /* mapa simulado */
  .map { position: absolute; inset: 0;
    background:
      repeating-linear-gradient(90deg, transparent 0 56px, var(--map-road) 56px 70px),
      repeating-linear-gradient(0deg, transparent 0 64px, var(--map-road) 64px 78px),
      var(--map-bg); }
  .pin { position: absolute; transform: translate(-50%,-50%); border-radius: 50%; border: 3px solid var(--bg-elev);
    box-shadow: 0 3px 8px rgba(0,0,0,.25); display: flex; align-items: center; justify-content: center; color: #fff; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; background: var(--bg-elev);
    border-radius: 22px 22px 0 0; box-shadow: 0 -6px 24px rgba(12,13,16,.12); padding: 8px 18px 20px; }
  .grabber { width: 40px; height: 4px; border-radius: 2px; background: var(--border-2); margin: 0 auto 12px; }

  /* botón SOS */
  .sos { position: absolute; width: 54px; height: 54px; border-radius: 50%; background: var(--danger);
    color: #fff; border: 3px solid var(--bg-elev); box-shadow: 0 6px 16px rgba(184,59,45,.4);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1px; z-index: 3; }
  .sos small { font-size: 8px; font-weight: 800; letter-spacing: .06em; }

  /* toast / aviso */
  .toast { position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%); z-index: 65;
    background: #0c0d10; color: #fff; font-size: 12.5px; font-weight: 500; padding: 11px 16px;
    border-radius: 999px; box-shadow: 0 8px 20px rgba(0,0,0,.3); display: flex; align-items: center; gap: 8px;
    white-space: nowrap; animation: toast .2s ease-out; }
  @keyframes toast { from { transform: translate(-50%,12px); opacity: 0; } to { transform: translate(-50%,0); opacity: 1; } }

  /* guía interactiva */
  .guide-overlay { position: absolute; inset: 0; z-index: 60; background: rgba(12,13,16,.66);
    display: flex; align-items: center; justify-content: center; padding: 0 28px; }
  .guide-card { width: 278px; background: var(--bg-elev); border-radius: 15px; padding: 15px 16px 13px; box-shadow: 0 14px 36px rgba(12,13,16,.3); }
  .guide-card .step { font-family: var(--font-mono); font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--primary); font-weight: 600; margin-bottom: 6px; }
  .guide-card h3 { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--fg); margin: 0 0 5px; }
  .guide-card p { font-size: 12.5px; line-height: 1.5; color: var(--fg-muted); margin: 0; }
  .guide-dots { display: flex; gap: 4px; margin: 12px 0; }
  .guide-dots i { height: 4px; flex: 1; border-radius: 2px; background: var(--bg-soft); }
  .guide-dots i.on { background: var(--primary); }
  .guide-actions { display: flex; align-items: center; gap: 8px; }
  .guide-actions .skip { font-size: 12px; font-weight: 600; color: var(--fg-faint); background: none; border: none; padding: 8px 2px; }
  .guide-actions .grp { margin-left: auto; display: flex; gap: 8px; }
  .guide-actions .grp button { font-size: 12px; font-weight: 700; border: none; border-radius: 9px; padding: 8px 16px; }
  .guide-actions .prev { background: var(--bg-soft); color: var(--fg); font-weight: 600; }
  .guide-actions .next { background: var(--primary); color: #fff; }

  @keyframes pulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.08);} }
  @keyframes radar { 0% { transform: scale(.5); opacity: .6;} 100% { transform: scale(2.4); opacity: 0;} }
  @keyframes trufimove { 0% { top: 27%; } 100% { top: 60%; } }

  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-faint); }
</style>
</head>
<body>

<!-- Barra de control (fuera del teléfono): cambiar de rol y de tema -->
<div class="toolbar">
  <div class="logo"><i data-lucide="route" style="width:19px;height:19px"></i></div>
  <div class="grow">
    <div class="name">MueveCotoca</div>
    <div class="tag" style="white-space:nowrap">App Pasajero · Mototaxi</div>
  </div>
  <a href="index.html" style="font-size:11px;font-weight:600;color:var(--fg-muted);text-decoration:none;border:1px solid var(--border);border-radius:999px;padding:6px 11px;flex:none">← Módulos</a>
  <div class="grow" style="display:none">
  </div>

  <div class="seg icons" id="themeSeg">
    <button data-theme-btn="light" title="Claro"><i data-lucide="sun" style="width:16px;height:16px"></i></button>
    <button data-theme-btn="dark" title="Oscuro"><i data-lucide="moon" style="width:15px;height:15px"></i></button>
  </div>
</div>

<!-- El teléfono -->
<div class="phone">
  <div class="screen" id="screen">
    <!-- Barra de estado Android -->
    <div class="statusbar">
      <span>14:25</span>
      <div class="notch"></div>
      <div class="row" style="gap:5px">
        <i data-lucide="signal" style="width:14px;height:14px"></i>
        <i data-lucide="wifi" style="width:14px;height:14px"></i>
        <i data-lucide="battery-medium" style="width:17px;height:17px"></i>
      </div>
    </div>
    <!-- Aquí se dibuja la pantalla actual -->
    <div class="body" id="app"></div>
    <!-- La barra de pestañas y la barra de navegación se inyectan desde JS -->
    <div id="chrome"></div>
  </div>
</div>

<div class="label" id="screenLabel">MueveCotoca</div>

<script>
/* ============================================================
   2. ESTADO de la aplicación
   ============================================================ */
const state = {
  theme: 'light',        // 'light' | 'dark'
  role: null,            // null | 'pax' | 'drv' | 'trf'
  view: 'login',         // pantalla actual
  service: 'moto',       // 'moto' | 'trufi' (solo pasajero)
  selectedLine: null,    // línea de trufi elegida
  online: false,         // conductor en línea
  onRoute: false,        // chofer de trufi en recorrido
  incoming: false,       // solicitud entrante (conductor)
  found: false,          // conductor asignado (pasajero)
  payMethod: 'qr',       // 'qr' | 'efectivo'
  guide: { active: false, i: 0 },
  toast: null,
};

/* Datos de ejemplo: líneas de trufi */
const TRUFI_LINES = [
  { id:1, name:'Línea 1', route:'Centro – Barrio Lindo', fare:'Bs 3,00', schedule:'05:30 – 22:00', eta:'3 min',
    stops:['Plaza 24 de Septiembre','Mercado Central','Av. Virgen de Cotoca','Surtidor Norte','Barrio Lindo'] },
  { id:2, name:'Línea 2', route:'Plaza – Terminal Bimodal', fare:'Bs 3,50', schedule:'06:00 – 21:30', eta:'7 min',
    stops:['Plaza principal','Hospital Cotoca','Av. Circunvalación','Cementerio','Terminal Bimodal'] },
  { id:3, name:'Línea 3', route:'Mercado – Hospital – UAGRM', fare:'Bs 3,00', schedule:'05:00 – 23:00', eta:'1 min',
    stops:['Mercado Central','Iglesia','Coliseo','Hospital Cotoca','UAGRM Cotoca'] },
];

/* Cambia el estado y vuelve a dibujar */
function setState(patch) { Object.assign(state, patch); render(); }

/* Atajo para íconos Lucide: ic('bike', 20) => '<i data-lucide="bike" ...></i>' */
function ic(name, size = 20, color = 'currentColor') {
  return `<i data-lucide="${name}" style="width:${size}px;height:${size}px;color:${color}"></i>`;
}

/* Muestra un aviso temporal */
let toastTimer = null;
function showToast(msg) {
  clearTimeout(toastTimer);
  setState({ toast: msg });
  toastTimer = setTimeout(() => setState({ toast: null }), 2600);
}

/* ============================================================
   3. ACCIONES (lo que pasa al tocar botones)
   ============================================================ */
function chooseRole(role) {
  const view = role === 'pax' ? 'pax.home' : (role === 'trf' ? 'trf.panel' : 'drv.panel');
  setState({ role, view, online:false, onRoute:false, incoming:false, found:false, guide:{active:false,i:0} });
  setTimeout(startGuide, 400);
}
function logout() { setState({ role:null, view:'login', guide:{active:false,i:0} }); }
function go(view) { setState({ view }); }
function setTheme(theme) { state.theme = theme; localStorage.setItem('mc_theme', theme); render(); }

/* Pasajero — pedir mototaxi */
function requestRide() {
  setState({ view:'pax.finding', found:false, guide:{active:false,i:0} });
  setTimeout(() => { if (state.view === 'pax.finding') setState({ found:true }); }, 2400);
}
function openLine(id) { setState({ selectedLine: TRUFI_LINES.find(l => l.id === id), view:'pax.trufiLine', guide:{active:false,i:0} }); }
function boardTrufi() { const L = state.selectedLine || {}; showToast('Sigue la ' + (L.name||'línea') + ' · próximo en ' + (L.eta||'pocos min')); }

/* Conductor (moto) */
function toggleOnline() {
  const online = !state.online;
  setState({ online, incoming:false });
  showToast(online ? 'Estás en línea · recibiendo solicitudes' : 'Sin conexión · no recibirás viajes');
  if (online) setTimeout(() => { if (state.online && state.view === 'drv.panel') setState({ incoming:true }); }, 3000);
}
function acceptRide() { setState({ incoming:false, view:'drv.active', guide:{active:false,i:0} }); }
function declineRide() { setState({ incoming:false }); }
function completeRide() { setState({ view:'drv.panel' }); showToast('Viaje completado · Bs 12,00 cobrado'); }

/* Chofer de trufi */
function toggleRoute() {
  const onRoute = !state.onRoute;
  setState({ onRoute });
  showToast(onRoute ? 'Recorrido iniciado · Línea 2' : 'Recorrido finalizado');
}

/* Pasajero — flujo de viaje */
function startTrip() { setState({ view:'pax.trip' }); }
function finishTrip() { setState({ view:'pax.pay' }); }
function setPay(m) { setState({ payMethod:m }); }
function payNow() { setState({ view:'pax.rate' }); showToast(state.payMethod==='qr' ? 'Pago QR confirmado · Bs 12,00' : 'Cobro en efectivo · Bs 12,00'); }
function finishRate() { setState({ view:'pax.home', found:false }); showToast('¡Gracias por viajar con MueveCotoca!'); }

/* Cuotas */
function payDues() { showToast('Cuota pagada con QR'); }

/* SOS */
function openSos() { setState({ view:state.view, sos:true }); }
function closeSos() { setState({ sos:false }); }
function confirmSos() { setState({ sos:false }); showToast('Alerta SOS enviada a la central'); }

/* ============================================================
   4. GUÍA INTERACTIVA (estilo paso a paso)
   ============================================================ */
function guideSteps() {
  if (state.role === 'trf') return [
    { t:'Bienvenido, chofer de trufi', d:'Este es tu panel de ruta. Te mostramos lo esencial en unos segundos.' },
    { t:'Inicia tu recorrido', d:'Actívalo al salir en tu línea para registrar tus vueltas y pasajeros.' },
    { t:'Navegación', d:'Ruta, Ganancias, tu Línea (cuotas y choferes) y tu Perfil.' },
    { t:'¡Listo!', d:'Puedes repetir esta guía cuando quieras desde el botón de ayuda (?).' },
  ];
  if (state.role === 'drv') return [
    { t:'Bienvenido, conductor', d:'Este es tu Panel. Te mostramos lo esencial en unos segundos.' },
    { t:'Conéctate', d:'Activa tu disponibilidad para empezar a recibir solicitudes cercanas.' },
    { t:'Ganancias de hoy', d:'Controla en vivo cuánto llevas ganado y los viajes completados.' },
    { t:'Solicitudes', d:'Cuando estás en línea, las nuevas solicitudes aparecen para aceptarlas con un toque.' },
    { t:'Navegación', d:'Panel, Ganancias, Sindicato (cuotas y socios) y tu Perfil.' },
    { t:'¡Listo!', d:'Puedes repetir esta guía cuando quieras desde el botón de ayuda (?).' },
  ];
  return [
    { t:'Te damos la bienvenida', d:'Este es tu panel principal. Te mostramos lo esencial en unos segundos.' },
    { t:'Elige tu servicio', d:'Cambia entre Mototaxi y Trufi según cómo quieras viajar.' },
    { t:'Tu ubicación', d:'El mapa muestra tu posición y los vehículos disponibles cerca de ti.' },
    { t:'Pedir mototaxi', d:'Confirma tu viaje y te asignamos al conductor más cercano de la asociación.' },
    { t:'Botón SOS', d:'Ante una emergencia, alerta a la asociación y a tus contactos al instante.' },
    { t:'¡Listo!', d:'Puedes repetir esta guía cuando quieras desde el botón de ayuda (?).' },
  ];
}
function startGuide() { setState({ guide:{ active:true, i:0 } }); }
function guideNext() {
  const steps = guideSteps();
  if (state.guide.i >= steps.length - 1) setState({ guide:{active:false,i:0} });
  else setState({ guide:{ active:true, i: state.guide.i + 1 } });
}
function guidePrev() { setState({ guide:{ active:true, i: Math.max(0, state.guide.i - 1) } }); }
function guideClose() { setState({ guide:{active:false,i:0} }); }

/* ============================================================
   5. PANTALLAS (cada una devuelve HTML)
   ============================================================ */

/* ---- LOGIN ---- */
function scLogin() {
  return `
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;background:linear-gradient(180deg,var(--primary-soft) 0%,var(--bg) 40%)">
    <div class="scroll" style="padding:30px 26px 22px">
      <div class="col" style="align-items:center;gap:14px;margin-top:14px">
        <div style="width:66px;height:66px;border-radius:19px;background:var(--primary);display:flex;align-items:center;justify-content:center;box-shadow:0 10px 24px rgba(118,188,74,.38);color:#fff">${ic('route',33)}</div>
        <div style="text-align:center">
          <div style="font-family:var(--font-display);font-size:27px;font-weight:700;letter-spacing:-.02em">Mueve<span style="color:var(--primary)">Cotoca</span></div>
          <div class="mono" style="font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--fg-muted);margin-top:5px">Mototaxis y Trufis · Cotoca</div>
        </div>
      </div>
      <h2 style="font-family:var(--font-display);font-size:21px;font-weight:700;letter-spacing:-.02em;margin:32px 0 4px">Ingresa a tu cuenta</h2>
      <p class="muted" style="font-size:13px;margin:0 0 16px;line-height:1.5">Usa tu número de celular registrado en la asociación.</p>
      <div class="eyebrow" style="margin-bottom:7px">Número de celular</div>
      <div class="row" style="gap:9px;background:var(--bg-elev);border:1px solid var(--border);border-radius:12px;padding:13px 14px">
        <span class="mono muted" style="font-size:13px">+591</span>

/* ============================================================
   6. ROUTER: decide qué pantalla y qué pestañas mostrar
   ============================================================ */
const SCREENS = {
  'login': scLogin,
  'pax.home': scPaxHome, 'pax.trufiLine': scTrufiLine, 'pax.finding': scPaxFinding,
  'pax.trip': scPaxTrip, 'pax.pay': scPaxPay, 'pax.rate': scPaxRate,
  'pax.trips': scPaxTrips, 'pax.news': scPaxNews, 'pax.profile': scPaxProfile,
  'drv.panel': scDrvPanel, 'drv.active': scDrvActive, 'drv.earnings': scDrvEarnings,
  'drv.union': scDrvUnion, 'drv.profile': scDrvProfile,
  'trf.panel': scTrfPanel, 'trf.earnings': scTrfEarnings, 'trf.line': scTrfLine, 'trf.profile': scTrfProfile,
};
const LABELS = {
  'login':'01 · Acceso','pax.home':'Pasajero · Inicio','pax.trufiLine':'Pasajero · Línea de trufi',
  'pax.finding':'Pasajero · Buscando','pax.trip':'Pasajero · En viaje','pax.pay':'Pasajero · Pago',
  'pax.rate':'Pasajero · Calificar','pax.trips':'Pasajero · Mis viajes','pax.news':'Pasajero · Noticias','pax.profile':'Pasajero · Perfil',
  'drv.panel':'Conductor · Panel','drv.active':'Conductor · En viaje','drv.earnings':'Conductor · Ganancias','drv.union':'Conductor · Sindicato','drv.profile':'Conductor · Perfil',
  'trf.panel':'Chofer trufi · Ruta','trf.earnings':'Chofer trufi · Ganancias','trf.line':'Chofer trufi · Línea','trf.profile':'Chofer trufi · Perfil',
};

/* pestañas por rol: [vista, ícono, etiqueta] */
const TABS = {
  pax: [['pax.home','navigation','Inicio'],['pax.trips','route','Viajes'],['pax.news','megaphone','Noticias'],['pax.profile','user','Perfil']],
  drv: [['drv.panel','layout-dashboard','Panel'],['drv.earnings','wallet','Ganancias'],['drv.union','users','Sindicato'],['drv.profile','user','Perfil']],
  trf: [['trf.panel','bus','Ruta'],['trf.earnings','wallet','Ganancias'],['trf.line','route','Línea'],['trf.profile','user','Perfil']],
};
/* qué vistas muestran la barra de pestañas */
const TAB_VIEWS = {
  pax: ['pax.home','pax.trips','pax.news','pax.profile'],
  drv: ['drv.panel','drv.earnings','drv.union','drv.profile'],
  trf: ['trf.panel','trf.earnings','trf.line','trf.profile'],
};

function renderTabs() {
  const role = state.role;
  if (!role || !TAB_VIEWS[role].includes(state.view)) return '';
  const tabs = TABS[role].map(([view, icon, label]) =>
    `<button class="${state.view===view?'on':''}" onclick="go('${view}')">${ic(icon,21)}${label}</button>`
  ).join('');
  return `<div class="tabbar">${tabs}</div>`;
}

/* superposiciones: guía, SOS y toast */
function renderOverlays() {
  let html = '';
  if (state.guide.active) {
    const steps = guideSteps();
    const i = state.guide.i, s = steps[i];
    const dots = steps.map((_, k) => `<i class="${k<=i?'on':''}"></i>`).join('');
    html += `<div class="guide-overlay">
      <div class="guide-card">
        <div class="step">Guía · ${i+1} / ${steps.length}</div>
        <h3>${s.t}</h3><p>${s.d}</p>
        <div class="guide-dots">${dots}</div>
        <div class="guide-actions">
          <button class="skip" onclick="guideClose()">Saltar</button>
          <div class="grp">
            ${i>0?'<button class="prev" onclick="guidePrev()">Anterior</button>':''}
            <button class="next" onclick="guideNext()">${i===steps.length-1?'Entendido':'Siguiente'}</button>
          </div>
        </div>
      </div>
    </div>`;
  }
  if (state.sos) {
    html += `<div class="guide-overlay" style="align-items:flex-end;padding:0">
      <div style="width:100%;background:var(--bg-elev);border-radius:22px 22px 35px 35px;padding:24px 22px 30px">
        <div class="col" style="align-items:center;gap:12px;text-align:center">
          <div style="width:60px;height:60px;border-radius:50%;background:var(--danger-soft);display:flex;align-items:center;justify-content:center;color:var(--danger)">${ic('shield-alert',30)}</div>
          <div style="font-family:var(--font-display);font-size:19px;font-weight:700">Enviar alerta SOS</div>
          <p class="muted" style="font-size:13px;margin:0;line-height:1.5">Se compartirá tu ubicación en vivo con la central de la asociación y tus contactos de emergencia.</p>
        </div>
        <button class="btn" style="background:var(--danger);margin-top:20px" onclick="confirmSos()">Confirmar emergencia</button>
        <button class="btn btn-2" style="margin-top:10px" onclick="closeSos()">Cancelar</button>
      </div>
    </div>`;
  }
  if (state.toast) {
    html += `<div class="toast">${ic('check-circle-2',15,'var(--primary)')}${state.toast}</div>`;
  }
  return html;
}

/* ============================================================
   7. RENDER: dibuja todo según el estado actual
   ============================================================ */
function render() {
  // tema en el contenedor del teléfono
  document.getElementById('screen').setAttribute('data-theme', state.theme);
  document.querySelector('.phone').setAttribute('data-theme', state.theme);
  document.body.setAttribute('data-theme', state.theme);

  // pantalla actual
  const screen = SCREENS[state.view] || (() => '<div class="scroll">Pantalla no encontrada</div>');
  document.getElementById('app').innerHTML = screen();

  // pestañas + barra de navegación Android + superposiciones
  document.getElementById('chrome').innerHTML =
    renderTabs() +
    '<div class="navhandle"><span></span></div>' +
    renderOverlays();

  // etiqueta debajo del teléfono
  document.getElementById('screenLabel').textContent = LABELS[state.view] || 'MueveCotoca';

  // estado visual de los botones de la barra de control
  document.querySelectorAll('#roleSeg button').forEach(b =>
    b.classList.toggle('on', b.dataset.role === state.role));
  document.querySelectorAll('#themeSeg button').forEach(b =>
    b.classList.toggle('on', b.dataset.themeBtn === state.theme));

  // (re)dibuja los íconos Lucide
  if (window.lucide) lucide.createIcons();
}

/* ============================================================
   8. ARRANQUE
   ============================================================ */
// recuerda el tema elegido
const savedTheme = localStorage.getItem('mc_theme');
if (savedTheme === 'light' || savedTheme === 'dark') state.theme = savedTheme;

// botones de la barra de control (rol y tema)
document.querySelectorAll('#roleSeg button').forEach(b =>
  b.addEventListener('click', () => chooseRole(b.dataset.role)));
document.querySelectorAll('#themeSeg button').forEach(b =>
  b.addEventListener('click', () => setTheme(b.dataset.themeBtn)));

render();
</script>
