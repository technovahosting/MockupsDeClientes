<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockups — Technova Hosting</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 48px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.5px;
    }

    header p {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:hover {
      border-color: #6366f1;
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.15);
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: #6366f1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .card h2 {
      font-size: 1.05rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .card p {
      font-size: 0.875rem;
      color: #94a3b8;
      line-height: 1.5;
    }

    .card-link {
      margin-top: auto;
      font-size: 0.8rem;
      color: #6366f1;
      display: flex;
      align-items: center;
      gap: 4px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Mockups de clientes</h1>
    <p>Technova Hosting — prototipos y vistas previas</p>
  </header>

  <div class="grid">

    <a class="card" href="./motocotoca/">
      <div class="card-icon">🏍️</div>
      <h2>MotoCotoca</h2>
      <p>App de gestión para taller y venta de motocicletas.</p>
      <span class="card-link">Ver mockup →</span>
    </a>

    <a class="card" href="./ferremax/">
      <div class="card-icon">🔧</div>
      <h2>Ferremax</h2>
      <p>Sistema de administración para ferretería.</p>
      <span class="card-link">Ver mockup →</span>
    </a>

  </div>

</body>
</html>
