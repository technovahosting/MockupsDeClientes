  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {

    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();

            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }

        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));

    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather

      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.

            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');

      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.

      }

    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting

        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.

          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');

        }

        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;

      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

green */\n  --gr-green-600: #5FA236;\n  --gr-green-700: #4A8327;\n  --gr-green-800: #36631B;\n  --gr-green-900: #244414;\n\n  /* ---------- Brand grays (from logo body + wordmark) ---------- */\n  --gr-gray-50:  #F6F7F6;   /* logo background tone */\n  --gr-gray-100: #ECECEC;\n  --gr-gray-200: #D9D9D9;\n  --gr-gray-300: #BFBFBF;\n  --gr-gray-400: #9A9A9A;\n  --gr-gray-500: #717171;   /* logo wordmark gray \"GR\" */\n  --gr-gray-600: #585858;\n  --gr-gray-700: #3F3F3F;\n  --gr-gray-800: #2A2A2A;\n  --gr-gray-900: #1A1A1A;\n\n  /* ---------- Semantic (kept inside the green/gray universe; alerts use amber/red only when strictly required) ---------- */\n  --gr-success: var(--gr-green-600);\n  --gr-success-bg: var(--gr-green-50);\n  --gr-warning: #C68A1F;          /* amber, used sparingly */\n  --gr-warning-bg: #FBF2DF;\n  --gr-danger:  #B83B2D;          /* used only for destructive */\n  --gr-danger-bg: #F8E5E2;\n  --gr-info:    var(--gr-gray-600);\n  --gr-info-bg: var(--gr-gray-50);\n\n  /* ---------- Foreground / background semantic vars ---------- */\n  --fg-1: var(--gr-gray-900);     /* primary text */\n  --fg-2: var(--gr-gray-700);     /* secondary text */\n  --fg-3: var(--gr-gray-500);     /* tertiary / meta */\n  --fg-4: var(--gr-gray-400);     /* disabled / placeholder */\n  --fg-on-green: #FFFFFF;\n  --fg-link: var(--gr-green-700);\n\n  --bg-1: #FFFFFF;                /* primary surface */\n  --bg-2: var(--gr-gray-50);      /* page background */\n  --bg-3: var(--gr-gray-100);     /* hover / subtle */\n  --bg-inverse: var(--gr-gray-900);\n\n  --border-1: var(--gr-gray-200); /* default border */\n  --border-2: var(--gr-gray-300); /* stronger border */\n  --border-focus: var(--gr-green-500);\n\n  /* ---------- Spacing scale (4px base) ---------- */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-7: 32px;\n  --space-8: 40px;\n  --space-9: 48px;\n  --space-10: 64px;\n   let role=null, view='login';\n    if(p.startMode==='pasajero'){role='pax';view='pax.home';}\n    else if(p.startMode==='conductor'){role='drv';view='drv.panel';}\n    let theme='light';\n    try{ const s=localStorage.getItem('mc_theme'); if(s==='light'||s==='dark') theme=s; }catch(e){}\n    this.state={ theme, role, view, online:false, incoming:false, found:false, payMethod:'qr', tour:{active:false,i:0}, spot:null, sos:false, toast:null };\n    this.screenRef=React.createRef();\n    this.timers=[];\n  }\n  componentDidMount(){ this.measureTour(); this._rs=()=>this.measureTour(); window.addEventListener('resize',this._rs); if(this.state.role && (this.props&&this.props.autoTour!==false)) this.later(()=>this.startTour(),500); }\n  componentDidUpdate(){ this.measureTour(); }\n  componentWillUnmount(){ this.timers.forEach(clearTimeout); window.removeEventListener('resize',this._rs); }\n  later(fn,ms){ const t=setTimeout(fn,ms); this.timers.push(t); return t; }\n  rgba(hex,a){ try{ hex=String(hex).replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join(''); const r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16); return 'rgba('+r+','+g+','+b+','+a+')'; }catch(e){ return 'rgba(118,188,74,'+a+')'; } }\n\n  setTheme(t){ try{localStorage.setItem('mc_theme',t);}catch(e){} this.setState({theme:t}); }\n  toast(msg){ this.setState({toast:msg}); this.later(()=>this.setState(s=>(s.toast===msg?{toast:null}:null)),2600); }\n\n  chooseRole(r){ const v = r==='pax'?'pax.home':'drv.panel'; this.endTour(); this.setState({role:r, view:v, online:false, incoming:false, found:false}); if(this.props&&this.props.autoTour!==false) this.later(()=>this.startTour(),550); }\n  switchRole(){ this.chooseRole(this.state.role==='pax'?'drv':'pax'); }\n  logout(){ this.endTour(); this.setState({role:null, view:'login'}); }\n\n  setTab(v){ this.endTour(); this.setState({view:v}); }\n  go(v){ this.setState({view:v}); }\n\n  requestRide(){ this.endTour s(); const step=steps[this.state.tour.i]; if(!step) return;\n    const sr=screen.getBoundingClientRect(); this._sw=sr.width; this._sh=sr.height;\n    let spot=null;\n    if(step.key){ const t=screen.querySelector('[data-tour=\"'+step.key+'\"]'); if(t){ const tr=t.getBoundingClientRect(); spot={top:tr.top-sr.top,left:tr.left-sr.left,width:tr.width,height:tr.height}; } }\n    const c=this.state.spot;\n    const same=(!c&&!spot)||(c&&spot&&c.top===spot.top&&c.left===spot.left&&c.width===spot.width&&c.height===spot.height);\n    if(!same) this.setState({spot});\n  }\n\n  renderTour(){\n    const h=React.createElement;\n    const steps=this.tourSteps(); const i=this.state.tour.i; const step=steps[i]; if(!step) return null;\n    const spot=this.state.spot; const SW=this._sw||372; const SH=this._sh||694; const pad=7;\n    const kids=[];\n    if(spot){\n      kids.push(h('div',{key:'sp',style:{position:'absolute',top:spot.top-pad,left:spot.left-pad,width:spot.width+pad*2,height:spot.height+pad*2,borderRadius:14,boxShadow:'0 0 0 9999px rgba(12,13,16,.66)',border:'2px solid var(--primary)',pointerEvents:'none',transition:'top .2s var(--ease-out),left .2s var(--ease-out),width .2s var(--ease-out),height .2s var(--ease-out)'}}));\n    } else {\n      kids.push(h('div',{key:'bd',style:{position:'absolute',inset:0,background:'rgba(12,13,16,.66)',pointerEvents:'none'}}));\n    }\n    const tipW=278; let tipTop, tipLeft=(SW-tipW)/2, above=false;\n    if(spot){\n      const below = spot.top + spot.height/2 < SH/2;\n      tipLeft = Math.min(Math.max(8, spot.left + spot.width/2 - tipW/2), SW - tipW - 8);\n      if(below){ tipTop = spot.top + spot.height + pad + 12; } else { above=true; tipTop = spot.top - pad - 12; }\n    } else { tipTop = SH/2 - 80; }\n    const tip=h('div',{key:'tip',style:{position:'absolute',top:tipTop,left:tipLeft,width:tipW,transform:above?'translateY(-100%)':'none',background:'var(--bg-elev)',borderRadius:15,padding:'15px 16px 13px',boxShadow:'0 14px 36px rgba(12,13,16,.3)',pointerEvents:'auto'}},[\n      h('div',{key:'e',style:{fontFamily:'var(--font-mono)',fontSize:10,letterSpacing:'0.12em',textTransform:'uppercase',color:'var(--primary)',fontWeight:600,marginBottom:6}},'Guía · '+(i+1)+' / '+steps.length),\n      h('div',{key:'t',style:{fontFamily:'var(--font-display)',fontSize:16,fontWeight:700,color:'var(--fg)',letterSpacing:'-0.01em',marginBottom:5}},step.title),\n      h('div',{key:'x',style:{fontSize:12.5,lineHeight:1.5,color:'var(--fg-muted)'}},step.text),\n      h('div',{key:'d',style:{display:'flex',gap:4,marginTop:12,marginBottom:12}},steps.map((_,k)=>h('div',{key:k,style:{height:4,flex:1,borderRadius:2,background:k<=i?'var(--primary)':'var(--bg-soft)'}}))),\n      h('div',{key:'b',style:{display:'flex',alignItems:'center',gap:8}},[\n        h('button',{key:'s',onClick:()=>this.endTour(),style:{fontFamily:'inherit',fontSize:12,fontWeight:600,color:'var(--fg-faint)',background:'transparent',border:'none',cursor:'pointer',padding:'8px 2px'}},'Saltar'),\n        h('div',{key:'r',style:{marginLeft:'auto',display:'flex',gap:8}},[\n          i>0?h('button',{key:'p',onClick:()=>this.tourPrev(),style:{fontFamily:'inherit',fontSize:12,fontWeight:600,color:'var(--fg)',background:'var(--bg-soft)',border:'none',borderRadius:9,padding:'8px 14px',cursor:'pointer'}},'Anterior'):null,\n          h('button',{key:'n',onClick:()=>this.tourNext(),style:{fontFamily:'inherit',fontSize:12,fontWeight:700,color:'#fff',background:'var(--primary)',border:'none',borderRadius:9,padding:'8px 16px',cursor:'pointer'}},i===steps.length-1?'Entendido':'Siguiente')\n        ])\n      ])\n    ]);\n    kids.push(tip);\n    return h('div',{style:{position:'absolute',inset:0,zIndex:60,pointerEvents:'auto'}},kids);\n  }\n\n  renderVals(){\n    const s=this.state; const v=s.view;\n    const ac=(a)=>a?'var(--primary)':'var(--fg-faint)';\n    const accent=(this.props&&this.props.accent)||'#76BC4A';\n    const labels={ 'login':'01 · Acceso','pax.home':'Pa
